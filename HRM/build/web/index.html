<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HRM - Hệ thống Quản trị Nhân sự</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .left-panel {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
    }

    .left-panel .panel-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: flex;
    }

    .right-panel {
      flex: 0 0 42%;
      background: #f5f6fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 3.5rem;
      position: relative;
      border-left: 1px solid white;
    }

    .auth-card {
      width: 100%;
      max-width: 340px;
      background: #fff;
      border-radius: 20px;
      padding: 2.8rem 2.4rem 2.2rem;
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto .9rem;
    }
    .logo-icon i {
      font-size: 1.6rem;
      color: #fff;
    }
    .logo-hrm {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -.5px;
      line-height: 1;
    }
    .logo-hrm .h, .logo-hrm .r, .logo-hrm .m { color: #ff6b00; }
    .logo-powered {
      font-size: .72rem;
      color: #aaa;
      margin-top: .25rem;
    }
    .logo-powered span { color: #ff6b00; font-weight: 600; }


    .welcome-heading {
      font-size: 1.1rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: .5rem;
    }
    .welcome-sub {
      font-size: .78rem;
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.5;
    }


    .btn-action {
      display: flex;
      align-items: center;
      text-decoration: none;
      padding: .9rem 1.2rem;
      border-radius: 12px;
      margin-bottom: .85rem;
      gap: .9rem;
    }

    .icon-box {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.1rem;
    }

    .btn-action .label {
      font-weight: 600;
      font-size: .9rem;
    }

    .btn-action .arrow {
      font-size: .8rem;
      opacity: .45;
    }

    .login-style {
      background: #eef4ff;
      color: #1565c0;
      border: 1.5px solid greenyellow;
    }
    .login-style .icon-box {
      background: #1565c0;
      color: #fff;
    }
    .login-style:hover {
      background: #1565c0;
      color: #fff;
      border-color: #1565c0;
      transform: translateY(-2px);
    }
    .login-style:hover .icon-box {
      background: rgba(255,255,255,.2);
      color: #fff;
    }
    .login-style:hover .arrow { opacity: .9; transform: translateX(3px); }

    .footer-note {
      text-align: center;
      font-size: .72rem;
      color: #b0b6c8;
      line-height: 1.6;
      margin-top: 1.6rem;
      padding-top: 1.2rem;
      border-top: 1px solid #f0f2f8;
    }


    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { flex: 1; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<div class="left-panel">
  <img src="public/asset/Left Panel.jpg" alt="HRM System" class="panel-img"/>
</div>

<div class="right-panel">
  <div class="auth-card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <i class="bi bi-people-fill"></i>
      </div>
      <div class="logo-hrm">
        <span class="h">H</span><span class="r">R</span><span class="m">M</span>
      </div>
      <div class="logo-powered">Powered by <span>Group 2</span></div>
    </div>

    <p class="welcome-heading">Chào mừng trở lại!</p>
    <p class="welcome-sub">Đăng nhập để quản lý nhân sự<br>và tổ chức của bạn</p>

    <a href="v1/auth/login" class="btn-action login-style">
      <span class="label">Đăng nhập hệ thống</span>
      <i class="bi bi-arrow-right arrow"></i>
    </a>

    <div class="footer-note">
      Gặp sự cố truy cập? Vui lòng liên hệ<br>
      <strong style="color:#9aa0b5;">Quản trị viên hệ thống</strong>
    </div>

  </div>


</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
