<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HRM - Hệ thống Quản trị Nhân sự</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: #0d1240;
    }

    /* ── LEFT PANEL ── */
    .left-panel {
      flex: 0 0 58%;
      position: relative;
      overflow: hidden;
    }

    .left-panel .panel-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    /* ── RIGHT PANEL ── */
    .right-panel {
      flex: 0 0 42%;
      background: #f5f6fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2.5rem 3.5rem;
      position: relative;
      /* subtle left border echoing the panel's blue glow */
      border-left: 1px solid rgba(21, 101, 192, 0.12);
    }
    

    /* card container */
    .auth-card {
      width: 100%;
      max-width: 340px;
      background: #fff;
      border-radius: 20px;
      padding: 2.8rem 2.4rem 2.2rem;
      box-shadow:
        0 2px 8px rgba(13,18,64,.06),
        0 12px 40px rgba(13,18,64,.10);
    }

    /* logo */
    .logo-wrap {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo-icon {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #1565c0 0%, #0d47a1 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto .9rem;
      box-shadow: 0 4px 16px rgba(21,101,192,.3);
    }
    .logo-icon i {
      font-size: 1.6rem;
      color: #fff;
    }
    .logo-hrm {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -.5px;
      line-height: 1;
    }
    .logo-hrm .h, .logo-hrm .r, .logo-hrm .m { color: #ff6b00; }
    .logo-powered {
      font-size: .72rem;
      color: #aaa;
      margin-top: .25rem;
    }
    .logo-powered span { color: #ff6b00; font-weight: 600; }

    /* welcome heading */
    .welcome-heading {
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a2e;
      text-align: center;
      margin-bottom: .5rem;
    }
    .welcome-sub {
      font-size: .78rem;
      color: #9aa0b5;
      text-align: center;
      margin-bottom: 2rem;
      line-height: 1.5;
    }

    /* divider */
    .divider {
      display: flex;
      align-items: center;
      gap: .7rem;
      margin: 1.4rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #eef0f5;
    }
    .divider span {
      font-size: .72rem;
      color: #c5c9d8;
    }

    /* action buttons */
    .btn-action {
      display: flex;
      align-items: center;
      text-decoration: none;
      padding: .9rem 1.2rem;
      border-radius: 12px;
      margin-bottom: .85rem;
      transition: all .25s cubic-bezier(.4, 0, .2, 1);
      border: 1.5px solid transparent;
      gap: .9rem;
    }

    .icon-box {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      transition: transform .25s;
    }

    .btn-action .label {
      font-weight: 600;
      font-size: .9rem;
      flex: 1;
    }

    .btn-action .arrow {
      font-size: .8rem;
      opacity: .45;
      transition: opacity .2s, transform .2s;
    }

    /* login style */
    .login-style {
      background: #eef4ff;
      color: #1565c0;
      border-color: #d5e4ff;
    }
    .login-style .icon-box {
      background: #1565c0;
      color: #fff;
    }
    .login-style:hover {
      background: #1565c0;
      color: #fff;
      border-color: #1565c0;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(21,101,192,.25);
    }
    .login-style:hover .icon-box {
      background: rgba(255,255,255,.2);
      color: #fff;
    }
    .login-style:hover .arrow { opacity: .9; transform: translateX(3px); }

    /* footer note */
    .footer-note {
      text-align: center;
      font-size: .72rem;
      color: #b0b6c8;
      line-height: 1.6;
      margin-top: 1.6rem;
      padding-top: 1.2rem;
      border-top: 1px solid #f0f2f8;
    }

    /* bottom brand strip outside card */
    .brand-strip {
      margin-top: 1.6rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .72rem;
      color: #c0c5d4;
    }
    .brand-strip .dot {
      width: 4px;
      height: 4px;
      background: #d0d4e0;
      border-radius: 50%;
    }

    /* responsive */
    @media (max-width: 768px) {
      .left-panel { display: none; }
      .right-panel { flex: 1; padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>

<!-- ══════════════════ LEFT PANEL ══════════════════ -->
<div class="left-panel">
  <img src="public/asset/Left Panel.jpg" alt="HRM System" class="panel-img"/>
</div>

<!-- ══════════════════ RIGHT PANEL ══════════════════ -->
<div class="right-panel">
  <div class="auth-card">
    <div class="logo-wrap">
      <div class="logo-icon">
        <i class="bi bi-people-fill"></i>
      </div>
      <div class="logo-hrm">
        <span class="h">H</span><span class="r">R</span><span class="m">M</span>
      </div>
      <div class="logo-powered">Powered by <span>Group 2</span></div>
    </div>

    <!-- welcome -->
    <p class="welcome-heading">Chào mừng trở lại!</p>
    <p class="welcome-sub">Đăng nhập để quản lý nhân sự<br>và tổ chức của bạn</p>

    <!-- login button -->
    <a href="http://localhost:8080/HRM/v1/auth/login" class="btn-action login-style">
      <div class="icon-box"><i class="bi bi-person-check-fill"></i></div>
      <span class="label">Đăng nhập hệ thống</span>
      <i class="bi bi-arrow-right arrow"></i>
    </a>

    <!-- footer note -->
    <div class="footer-note">
      Gặp sự cố truy cập? Vui lòng liên hệ<br>
      <strong style="color:#9aa0b5;">Quản trị viên hệ thống</strong>
    </div>

  </div>

  <!-- brand strip -->
  <div class="brand-strip">
    <span>HRM System</span>
    <span class="dot"></span>
    <span>Phần mềm Quản trị Nhân sự</span>
    <span class="dot"></span>
    <span>v2.0</span>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
